name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm test
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - name: Validate production Compose
        run: |
          AUTO_REIGN_ENV_FILE="$PWD/deploy/auto-reign.env.example" \
            docker compose \
              --env-file deploy/auto-reign.env.example \
              --file deploy/compose.prod.yml \
              config --quiet
      - run: docker build --tag auto-reign-backend:ci backend
      - name: Verify non-root backend can write application volume
        run: |
          volume=auto-reign-ci-app-data
          trap 'docker volume rm --force "$volume" >/dev/null 2>&1 || true' EXIT
          docker volume create "$volume"
          docker run --rm \
            --mount "type=volume,source=$volume,target=/app/data" \
            auto-reign-backend:ci \
            python -c 'from pathlib import Path; Path("/app/data/write-check").write_text("ok")'
      - run: docker build --tag auto-reign-frontend:ci frontend

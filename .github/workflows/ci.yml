name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: auto_reign_migration_test
          MYSQL_USER: auto_reign
          MYSQL_PASSWORD: auto_reign
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=auto_reign --password=auto_reign"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -v
      - name: Upgrade disposable MySQL schema
        env:
          DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
        run: uv run alembic upgrade head
      - name: Run MySQL migration integration
        env:
          DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          MYSQL_MIGRATION_DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          RUN_MYSQL_INTEGRATION: "1"
        run: uv run pytest -v tests/integration/test_mysql_schema.py
      - name: Run MySQL attachment binding integration
        env:
          MYSQL_ATTACHMENT_BINDING_DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          RUN_MYSQL_INTEGRATION: "1"
        run: uv run pytest -v tests/integration/test_attachment_binding_mysql.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm test
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - name: Validate production Compose
        run: |
          AUTO_REIGN_ENV_FILE="$PWD/deploy/auto-reign.env.example" \
            S3_ACCESS_KEY_ID=ci-test \
            S3_SECRET_ACCESS_KEY=ci-test \
            docker compose \
              --env-file deploy/auto-reign.env.example \
              --file deploy/compose.prod.yml \
              config --quiet
      - run: docker build --tag auto-reign-backend:ci backend
      - run: docker build --tag auto-reign-frontend:ci frontend

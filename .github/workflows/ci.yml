name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --project backend --frozen
      - name: Verify a single Alembic head
        run: scripts/check-alembic-heads.sh
      - name: Verify authoritative documentation impact
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_ref="$PR_BASE_SHA"
          else
            base_ref="$PUSH_BEFORE_SHA"
            if [[ "$base_ref" =~ ^0+$ ]]; then
              base_ref="--root"
            fi
          fi
          scripts/check-docs-impact.sh "$base_ref"

  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: auto_reign_migration_test
          MYSQL_USER: auto_reign
          MYSQL_PASSWORD: auto_reign
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=auto_reign --password=auto_reign"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -v
      - name: Run Elasticsearch Retriever integration
        env:
          ELASTICSEARCH_URL: http://127.0.0.1:9200
          RUN_ELASTICSEARCH_INTEGRATION: "1"
        run: uv run pytest -v tests/integration/test_knowledge_elasticsearch.py
      - name: Upgrade disposable MySQL schema
        env:
          DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
        run: uv run alembic upgrade head
      - name: Run MySQL migration integration
        env:
          DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          MYSQL_MIGRATION_DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          RUN_MYSQL_INTEGRATION: "1"
        run: uv run pytest -v tests/integration/test_mysql_schema.py
      - name: Run MySQL SubtaskContext binding integration
        env:
          MYSQL_SUBTASK_CONTEXT_DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          RUN_MYSQL_INTEGRATION: "1"
        run: uv run pytest -v tests/integration/test_subtask_context_binding_mysql.py
      - name: Run MySQL concurrency and generation integration
        env:
          MYSQL_BOOTSTRAP_RACE_DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          # The lock-wait proof reads performance_schema; this disposable
          # service-container database therefore uses the CI-only root user.
          MYSQL_RESOURCE_RACE_DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/auto_reign_migration_test
          RUN_MYSQL_INTEGRATION: "1"
        run: >-
          uv run pytest -v
          tests/integration/test_bootstrap_race_mysql.py
          tests/integration/test_resource_reference_races_mysql.py
          tests/integration/test_knowledge_reference_mysql.py
          tests/integration/test_knowledge_worker_mysql.py
      - name: Run Redis stream atomicity integration
        env:
          REDIS_TEST_URL: redis://127.0.0.1:6379/15
          RUN_REDIS_INTEGRATION: "1"
        run: uv run pytest -v tests/test_chat_stream_store.py -k real_redis
      - name: Run MySQL and Redis Task room integration
        env:
          MYSQL_MIGRATION_DATABASE_URL: mysql+pymysql://auto_reign:auto_reign@127.0.0.1:3306/auto_reign_migration_test
          REDIS_URL: redis://127.0.0.1:6379/15
          RUN_MYSQL_INTEGRATION: "1"
        run: uv run pytest -v tests/integration/test_task_room_mysql_redis.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm test
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - name: Validate production Compose
        run: |
          AUTO_REIGN_ENV_FILE="$PWD/deploy/auto-reign.env.example" \
            S3_ACCESS_KEY_ID=ci-test \
            S3_SECRET_ACCESS_KEY=ci-test \
            docker compose \
              --env-file deploy/auto-reign.env.example \
              --file deploy/compose.prod.yml \
              config --quiet
      - run: docker build --tag auto-reign-backend:ci backend
      - run: docker build --tag auto-reign-frontend:ci frontend

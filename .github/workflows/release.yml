name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without v prefix (for example 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - id: version
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match MAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "GitHub Release v$VERSION already exists" >&2
            exit 1
          fi
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "refs/tags/v$VERSION")"
            if [[ "$tag_commit" != "$SOURCE_SHA" ]]; then
              echo "Tag v$VERSION points to $tag_commit instead of $SOURCE_SHA" >&2
              exit 1
            fi
            echo "Reusing existing tag v$VERSION after an incomplete release."
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Validate ACR configuration
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "$ACR_REGISTRY" || { echo "Repository variable ACR_REGISTRY is required" >&2; exit 1; }
          test -n "$ACR_NAMESPACE" || { echo "Repository variable ACR_NAMESPACE is required" >&2; exit 1; }
          test -n "$ACR_USERNAME" || { echo "Repository secret ACR_USERNAME is required" >&2; exit 1; }
          test -n "$ACR_PASSWORD" || { echo "Repository secret ACR_PASSWORD is required" >&2; exit 1; }

  verify:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend checks
        working-directory: backend
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run pytest -v
      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev
          npm test
          npm run build

  images:
    needs: [metadata, verify]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: backend
            dockerfile: backend/Dockerfile
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.ACR_REGISTRY }}/${{ vars.ACR_NAMESPACE }}/auto-reign-${{ matrix.component }}:${{ needs.metadata.outputs.version }}
            ${{ vars.ACR_REGISTRY }}/${{ vars.ACR_NAMESPACE }}/auto-reign-${{ matrix.component }}:sha-${{ needs.metadata.outputs.source_sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.source_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  github-release:
    needs: [metadata, images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}
          fetch-depth: 0
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
            if [[ "$tag_commit" != "$SOURCE_SHA" ]]; then
              echo "Tag $RELEASE_TAG points to $tag_commit instead of $SOURCE_SHA" >&2
              exit 1
            fi
            echo "Reusing existing tag $RELEASE_TAG."
          else
            git tag --annotate "$RELEASE_TAG" "$SOURCE_SHA" --message "Auto Reign $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

          cat > release-notes.md <<EOF
          ## 生产镜像

          - \`${ACR_REGISTRY}/${ACR_NAMESPACE}/auto-reign-backend:${VERSION}\`
          - \`${ACR_REGISTRY}/${ACR_NAMESPACE}/auto-reign-frontend:${VERSION}\`

          源码提交：\`${SOURCE_SHA}\`

          镜像由 GitHub Actions 从 \`main\` 构建。生产部署必须使用版本标签，不使用 \`latest\`。
          EOF
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "Auto Reign $RELEASE_TAG" \
            --generate-notes \
            --notes "$(cat release-notes.md)"

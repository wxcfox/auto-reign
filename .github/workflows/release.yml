name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Validate ACR configuration
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "$ACR_REGISTRY" || { echo "Repository variable ACR_REGISTRY is required" >&2; exit 1; }
          test -n "$ACR_NAMESPACE" || { echo "Repository variable ACR_NAMESPACE is required" >&2; exit 1; }
          test -n "$ACR_USERNAME" || { echo "Repository secret ACR_USERNAME is required" >&2; exit 1; }
          test -n "$ACR_PASSWORD" || { echo "Repository secret ACR_PASSWORD is required" >&2; exit 1; }

  verify:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend checks
        working-directory: backend
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run pytest -v
      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev
          npm test
          npm run build

  images:
    needs: [metadata, verify]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: backend
            dockerfile: backend/Dockerfile
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.ACR_REGISTRY }}/${{ vars.ACR_NAMESPACE }}/auto-reign-${{ matrix.component }}:${{ needs.metadata.outputs.version }}
            ${{ vars.ACR_REGISTRY }}/${{ vars.ACR_NAMESPACE }}/auto-reign-${{ matrix.component }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  github-release:
    needs: [metadata, images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.metadata.outputs.version }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
        run: |
          cat > release-notes.md <<EOF
          ## 生产镜像

          - \`${ACR_REGISTRY}/${ACR_NAMESPACE}/auto-reign-backend:${VERSION}\`
          - \`${ACR_REGISTRY}/${ACR_NAMESPACE}/auto-reign-frontend:${VERSION}\`

          镜像由 GitHub Actions 从 Tag \`${RELEASE_TAG}\` 构建。生产部署必须使用版本标签，不使用 \`latest\`。
          EOF
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "Auto Reign $RELEASE_TAG" \
            --generate-notes \
            --notes "$(cat release-notes.md)"

name: auto-reign-production

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-backend-environment: &backend-environment
  APP_ENV: production
  BACKEND_INSTANCE_COUNT: "1"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  APP_VERSION: ${AUTO_REIGN_VERSION:?Set AUTO_REIGN_VERSION}
  DATA_DIR: /app/data
  DATABASE_URL: mysql+pymysql://${MYSQL_USER:?Set MYSQL_USER}:${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:?Set MYSQL_DATABASE}
  REDIS_URL: redis://redis:6379/0
  CHAT_STREAM_TTL_SECONDS: ${CHAT_STREAM_TTL_SECONDS:-3600}
  CHAT_STREAM_KEY_PREFIX: ${CHAT_STREAM_KEY_PREFIX:-auto_reign:chat}
  SOCKETIO_PING_INTERVAL_SECONDS: ${SOCKETIO_PING_INTERVAL_SECONDS:-25}
  SOCKETIO_PING_TIMEOUT_SECONDS: ${SOCKETIO_PING_TIMEOUT_SECONDS:-20}
  QDRANT_URL: http://qdrant:6333
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  ELASTICSEARCH_URL: http://elasticsearch:9200
  ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-auto_reign_knowledge}
  ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-elastic}
  ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:?Set ELASTICSEARCH_PASSWORD}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
  OBJECT_STORE_BACKEND: s3
  OBJECT_STORE_MAX_READ_BYTES: ${OBJECT_STORE_MAX_READ_BYTES:-33554432}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?Set S3_ENDPOINT_URL}
  S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET}
  S3_NAMESPACE_APP_EXCLUSIVE: "true"
  S3_REGION: ${S3_REGION:?Set S3_REGION}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY}
  S3_SESSION_TOKEN: ${S3_SESSION_TOKEN:-}
  S3_KEY_PREFIX: ${S3_KEY_PREFIX:-auto-reign-production}
  S3_ADDRESSING_STYLE: virtual

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    restart: unless-stopped
    volumes:
      - ${AUTO_REIGN_REDIS_DIR:?Set AUTO_REIGN_REDIS_DIR}:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    logging: *default-logging

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    volumes:
      - ${AUTO_REIGN_MYSQL_DIR:?Set AUTO_REIGN_MYSQL_DIR}:/var/lib/mysql
    networks:
      - data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    logging: *default-logging

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.17.0}
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - ${AUTO_REIGN_QDRANT_DIR:?Set AUTO_REIGN_QDRANT_DIR}:/qdrant/storage
    networks:
      - data
    healthcheck:
      test: ["CMD", "bash", "-c", 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && IFS= read -r status <&3 && [[ "$$status" == *" 200 "* ]]']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging: *default-logging

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.19.3}
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD:?Set ELASTICSEARCH_PASSWORD}
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    volumes:
      - ${AUTO_REIGN_ELASTICSEARCH_DIR:?Set AUTO_REIGN_ELASTICSEARCH_DIR}:/usr/share/elasticsearch/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:$${ELASTIC_PASSWORD} 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    logging: *default-logging

  migrate:
    image: ${ACR_REGISTRY:?Set ACR_REGISTRY}/${ACR_NAMESPACE:?Set ACR_NAMESPACE}/auto-reign-backend:${AUTO_REIGN_VERSION:?Set AUTO_REIGN_VERSION}
    profiles: ["tools"]
    env_file:
      - path: ${AUTO_REIGN_ENV_FILE:-/etc/auto-reign/auto-reign.env}
        required: true
    environment: *backend-environment
    command: ["alembic", "upgrade", "head"]
    volumes:
      - ${AUTO_REIGN_DATA_DIR:?Set AUTO_REIGN_DATA_DIR}:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - data
    logging: *default-logging

  backend:
    image: ${ACR_REGISTRY:?Set ACR_REGISTRY}/${ACR_NAMESPACE:?Set ACR_NAMESPACE}/auto-reign-backend:${AUTO_REIGN_VERSION:?Set AUTO_REIGN_VERSION}
    restart: unless-stopped
    env_file:
      - path: ${AUTO_REIGN_ENV_FILE:-/etc/auto-reign/auto-reign.env}
        required: true
    environment: *backend-environment
    volumes:
      - ${AUTO_REIGN_DATA_DIR:?Set AUTO_REIGN_DATA_DIR}:/app/data
    ports:
      - "127.0.0.1:${AUTO_REIGN_BACKEND_PORT:-18300}:8000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - app
      - data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging: *default-logging

  frontend:
    image: ${ACR_REGISTRY:?Set ACR_REGISTRY}/${ACR_NAMESPACE:?Set ACR_NAMESPACE}/auto-reign-frontend:${AUTO_REIGN_VERSION:?Set AUTO_REIGN_VERSION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AUTO_REIGN_FRONTEND_PORT:-13100}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging: *default-logging

networks:
  app:
  data:
    internal: true

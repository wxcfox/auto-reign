name: auto-reign

x-healthcheck-defaults: &healthcheck-defaults
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 10s

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auto_reign}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-auto_reign}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-auto_reign_root}
      MYSQL_USER: ${MYSQL_USER:-auto_reign}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-auto_reign_root}"]

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.17.0}
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "${QDRANT_HTTP_PORT:-16333}:6333"
      - "${QDRANT_GRPC_PORT:-16334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "bash", "-c", 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && IFS= read -r status <&3 && [[ "$$status" == *" 200 "* ]]']

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.19.3}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_PORT:-19200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]

volumes:
  mysql_data:
  qdrant_data:
  elasticsearch_data:

name: auto-reign

x-healthcheck-defaults: &healthcheck-defaults
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 10s

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auto_reign}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-auto_reign}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-auto_reign_root}
      MYSQL_USER: ${MYSQL_USER:-auto_reign}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-auto_reign_root}"]

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.17.0}
    ports:
      - "${QDRANT_HTTP_PORT:-16333}:6333"
      - "${QDRANT_GRPC_PORT:-16334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6333/readyz', timeout=5)"]

volumes:
  mysql_data:
  qdrant_data:
